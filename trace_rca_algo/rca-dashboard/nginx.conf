server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to trace-rca-service
    location /api/ {
        proxy_pass http://trace-rca-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
