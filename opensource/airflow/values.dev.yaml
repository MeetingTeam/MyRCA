webserver:
  args:
  - bash
  - -c
  - exec airflow webserver --workers 2 --worker-timeout 300
  defaultUser:
    email: admin@example.com
    enabled: true
    firstName: Admin
    lastName: User
    password: admin
    username: admin
    role: Admin
  extraInitContainers: []
  extraVolumeMounts: []
  extraVolumes: []
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  service:
    ports:
    - name: airflow-ui
      nodePort: 30380
      port: 8080
    type: NodePort
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
webserverSecretKeySecretName: airflow-webserver-secret

workers:
  extraInitContainers: []
  extraVolumeMounts: []
  extraVolumes: []