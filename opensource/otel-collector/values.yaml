image:
  repository: "otel/opentelemetry-collector-contrib"
  tag: 0.148.0
  pullPolicy: IfNotPresent
  pullSecrets: []


nameOverride: ""
fullnameOverride: ""

ingestor:
  serviceAccount:
    enabled: false

  otel_config:
    processors:
      transform/set_nginx_app_id:
        error_mode: ignore
        trace_statements:
          - context: resource
            statements:
              - set(attributes["app_id"], "k8s-repo-application") where attributes["service.name"] == "nginx-proxy"
      filter/drop_no_app_id:
        error_mode: ignore
        traces:
          span:
            - 'resource.attributes["app_id"] == nil'
      batch:
        timeout: 1s
        send_batch_size: 10

    exporters:
      otlp:
        endpoint: "tempo.tempo.svc.cluster.local:4317"
        tls:
          insecure: true
      kafka:
        brokers:
          - redpanda.redpanda.svc.cluster.local:9093
        traces:
          encoding: "otlp_json"
          topic: "traces"
      otlphttp/loki:
        endpoint: "http://loki.loki.svc.cluster.local:3100/otlp"
        tls:
          insecure: true

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [transform/set_nginx_app_id, filter/drop_no_app_id, batch]
          exporters: [otlp, kafka]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/loki]

  deployment:
    podAnnotations: {}
    podLabels: {}

    podSecurityContext: {}
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    replicaCount: 2

    env: []

    resources: {}

    livenessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 5
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 5
      periodSeconds: 10

    nodeSelector: {}

    tolerations: []

    affinity: {}

  service:
    type: ClusterIP
    ports:
      grpc: 4317
      http: 4318

  ingress:
    enabled: false
