# Auth Secrets Template - Add these to your existing secret.yaml
# ========================================================
#
# Option 1: Add to existing trace-rca-service-secret
# --------------------------------------------------
# Add these fields to your existing secret.yaml stringData section:
#
#   stringData:
#     GOOGLE_CLIENT_ID: "your-client-id.apps.googleusercontent.com"
#     JWT_SECRET: "your-random-32-byte-secret-here"
#
# Option 2: Create separate auth secret
# --------------------------------------------------
# Create this as a new secret and add secretRef to deployment
#
apiVersion: v1
kind: Secret
metadata:
  name: rca-auth-secrets
  namespace: rca
type: Opaque
stringData:
  # Get from Google Cloud Console > APIs & Services > Credentials
  GOOGLE_CLIENT_ID: "REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID"

  # Generate with: openssl rand -base64 32
  JWT_SECRET: "REPLACE_WITH_RANDOM_32_BYTE_SECRET"

# If using Option 2, add this to deployment.yaml spec.containers[].envFrom:
#
#   - secretRef:
#       name: rca-auth-secrets
