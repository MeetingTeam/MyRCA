apiVersion: v1
kind: ConfigMap
metadata:
  name: anomaly-detection-service-config
  namespace: anomaly-detection
data:
  KAFKA_BROKERS: "redpanda.redpanda.svc.cluster.local:9093"
  INPUT_TOPIC: "preprocess-data"
  CONSUMER_GROUP: "anomaly-group"
  BATCH_SIZE: "200"
  ANOMALY_THRESHOLD: "0.5"
  S3_ENDPOINT: "s3.amazonaws.com"
  S3_REGION: "ap-southeast-1"
  S3_BUCKET: "kltn-anomaly-dateset-1"
  S3_USE_SSL: "true"
  MODEL_S3_PATH: ""
  MODEL_VERSION: ""
  FLUSH_ROW_THRESHOLD: "200"
  FLUSH_INTERVAL_SECONDS: "2"
  HEALTH_PORT: "8080"
  MAX_CACHED_MODELS: "10"
