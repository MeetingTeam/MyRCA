apiVersion: v1
kind: ConfigMap
metadata:
  name: anomaly-detection-service-config
  namespace: anomaly-detection
data:
  KAFKA_BROKERS: "redpanda.redpanda.svc.cluster.local:9093"
  INPUT_TOPIC: "preprocess-data"
  CONSUMER_GROUP: "anomaly-group"
  BATCH_SIZE: "500"
  ANOMALY_THRESHOLD: "0.5"
  S3_ENDPOINT: "s3.amazonaws.com"
  S3_REGION: "ap-southeast-1"
  S3_BUCKET: "kltn-anomaly-dateset-1"
  S3_USE_SSL: "true"
  MODEL_S3_PATH: ""
  MODEL_VERSION: ""
  FLUSH_ROW_THRESHOLD: "500"
  FLUSH_INTERVAL_SECONDS: "5"
  HEALTH_PORT: "8080"
  MAX_CACHED_MODELS: "10"

  CLICKHOUSE_HOST: "clickhouse-cluster-client.clickhouse.svc.cluster.local"
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_DATABASE: "default"

  PERF_MEASUREMENT_ENABLED: "true"

