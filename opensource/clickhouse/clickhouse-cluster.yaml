apiVersion: clickhouse.com/v1alpha1
kind: KeeperCluster
metadata:
  name: keeper-cluster
  namespace: clickhouse
spec:
  replicas: 1                    # single keeper, no quorum needed for dev
  dataVolumeClaimSpec:
    storageClassName: ebs-sc
    resources:
      requests:
        storage: 1Gi
  # settings:
  #   extraConfig:
  #     keeper_server:
  #       digest_enabled: false
---
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-password
  namespace: clickhouse
stringData:
  password: "admin123"
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-cluster-client
  namespace: clickhouse
spec:
  type: NodePort
  selector:
    app: clickhouse-cluster-clickhouse
    app.kubernetes.io/instance: clickhouse-cluster-clickhouse
    app.kubernetes.io/name: clickhouse-server
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      nodePort: 30123   # HTTP interface
    - name: tcp
      port: 9000
      targetPort: 9000
      nodePort: 30900   # native TCP (clickhouse-client)
---
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: clickhouse-cluster
  namespace: clickhouse
spec:
  replicas: 1
  dataVolumeClaimSpec:
    storageClassName: ebs-sc
    resources:
      requests:
        storage: 5Gi
  keeperClusterRef:
    name: keeper-cluster
  containerTemplate:
    resources:
      requests:
        cpu: "250m"
        memory: "700Mi"
      limits:
        cpu: "500m"
        memory: "700Mi"
  # settings:
  #   defaultUserPassword:
  #     passwordType: plaintext
  #     secret:
  #       name: clickhouse-password
  #       key: password