# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: clickhouse-s3-credentials
#   namespace: clickhouse
# type: Opaque
# stringData:
#   AWS_ACCESS_KEY_ID: <access-key-id>
#   AWS_SECRET_ACCESS_KEY: <secret-access-key>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-storage-config
  namespace: clickhouse
data:
  storage-config.xml: |
    <clickhouse>
      <storage_configuration>
        <disks>
          <cold_s3>
            <type>object_storage</type>
            <object_storage_type>s3</object_storage_type>
            <metadata_type>local</metadata_type>
            <endpoint>https://kltn-anomaly-dateset-1.s3.ap-southeast-1.amazonaws.com/clickhouse/</endpoint>
            <use_environment_credentials>1</use_environment_credentials>
          </cold_s3>
        </disks>
        <policies>
          <hot_cold>
            <volumes>
              <hot>
                <disk>default</disk>
                <max_data_part_size_bytes>1073741824</max_data_part_size_bytes>
              </hot>
              <cold>
                <disk>cold_s3</disk>
              </cold>
            </volumes>
            <move_factor>0.8</move_factor>
          </hot_cold>
        </policies>
      </storage_configuration>
    </clickhouse>
---
apiVersion: clickhouse.com/v1alpha1
kind: KeeperCluster
metadata:
  name: keeper-cluster
  namespace: clickhouse
spec:
  replicas: 1
  dataVolumeClaimSpec:
    storageClassName: ebs-sc
    resources:
      requests:
        storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-cluster-client
  namespace: clickhouse
spec:
  type: NodePort
  selector:
    app: clickhouse-cluster-clickhouse
    app.kubernetes.io/instance: clickhouse-cluster-clickhouse
    app.kubernetes.io/name: clickhouse-server
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      nodePort: 30123
    - name: tcp
      port: 9000
      targetPort: 9000
      nodePort: 30900
---
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: clickhouse-cluster
  namespace: clickhouse
spec:
  replicas: 1
  dataVolumeClaimSpec:
    storageClassName: ebs-sc
    resources:
      requests:
        storage: 5Gi
  keeperClusterRef:
    name: keeper-cluster
  containerTemplate:
    resources:
      requests:
        cpu: "250m"
        memory: "700Mi"
      limits:
        cpu: "500m"
        memory: "700Mi"
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: clickhouse-s3-credentials
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: clickhouse-s3-credentials
            key: AWS_SECRET_ACCESS_KEY
    volumeMounts:
      - name: storage-config
        mountPath: /etc/clickhouse-server/config.d
        subPath: storage-config.xml
  podTemplate:
    volumes:
      - name: storage-config
        configMap:
          name: clickhouse-storage-config
