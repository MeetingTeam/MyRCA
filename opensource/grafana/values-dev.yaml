

replicas: 1


image:
  repository: grafana/grafana
  tag: "12.0.2-ubuntu"
  pullPolicy: IfNotPresent

# ══════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT VARIABLES
# Allow loading unsigned DuckDB plugin
# ══════════════════════════════════════════════════════════════════════════════
env:
  GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "motherduck-duckdb-datasource"

# Load AWS credentials from Kubernetes Secret
# Secret must contain: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
envFromSecrets:
  - name: grafana-aws-credentials
    optional: false

# Kill old pod before starting new one (required for RWO EBS PVC)
deploymentStrategy:
  type: Recreate

# Persistence for dashboards
persistence:
  enabled: true
  size: 1Gi  
  storageClassName: "ebs-sc"  

# Resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 512Mi

# Admin credentials (DEV ONLY)
adminUser: admin
adminPassword: admin

# ══════════════════════════════════════════════════════════════════════════════
# DATASOURCES CONFIGURATION
# - Tempo: Distributed tracing (default)
# - Loki: Log aggregation (trace-log correlation via OTel trace_id)
# - DuckDB: Query anomaly detection results from S3 Parquet
# ══════════════════════════════════════════════════════════════════════════════
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # Tempo datasource for distributed tracing
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.tempo.svc.cluster.local:3200
        isDefault: true
        editable: true
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false

      # Loki datasource for log aggregation
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.loki.svc.cluster.local:3100
        isDefault: false
        editable: true
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "trace_id=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"

      # DuckDB datasource for S3 anomaly data
      # Plugin: https://github.com/motherduckdb/grafana-duckdb-datasource
      - name: DuckDB-Anomaly
        type: motherduck-duckdb-datasource
        access: proxy
        isDefault: false
        editable: true
        jsonData:
          # Empty path = in-memory DuckDB (data resides in S3)
          path: ""
          # initSQL loads httpfs extension and configures S3 credentials
          # Credentials are injected from grafana-aws-credentials secret via envFromSecrets
          # Grafana provisioning substitutes ${ENV_VAR} before passing to plugin
          initSQL: |
            INSTALL httpfs;
            LOAD httpfs;
            SET s3_endpoint='s3.amazonaws.com';
            SET s3_region='ap-southeast-7';
            SET s3_access_key_id='';
            SET s3_secret_access_key='';
            SET s3_use_ssl=true;
            SET s3_url_style='path';

# ══════════════════════════════════════════════════════════════════════════════
# DASHBOARD PROVISIONING
# ══════════════════════════════════════════════════════════════════════════════
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: "myrca"
        orgId: 1
        folder: "MyRCA"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/myrca

dashboardsConfigMaps:
  myrca: "grafana-dashboards-myrca"

# Service configuration
service:
  type: NodePort
  nodePort: 30300  # Access via node IP:30300

# ══════════════════════════════════════════════════════════════════════════════
# PLUGINS
# - grafana-clock-panel: Utility
# - motherduck-duckdb-datasource: DuckDB/S3 data source (unsigned, requires env var)
# ══════════════════════════════════════════════════════════════════════════════
plugins:
  - grafana-clock-panel
  - https://github.com/motherduckdb/grafana-duckdb-datasource/releases/download/v0.4.0/motherduck-duckdb-datasource-0.4.0.zip;motherduck-duckdb-datasource
