# Tempo Development Configuration
# Monolithic mode for thesis demo
# Architecture: Tempo receives traces from AI Model (not directly from apps)
# Backend Storage: local filesystem on PVC

tempo:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Increased probe timeouts to prevent crash loop under load
  livenessProbe:
    httpGet:
      path: /ready
      port: 3200
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /ready
      port: 3200
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5
  
  # OTLP receivers - receives traces from AI Anomaly Detection Model
  # AI Model forwards ALL traces (normal + anomaly) via OTLP/gRPC
  # Endpoint: tempo-distributor.tempo.svc.cluster.local:4317
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  
  # Storage backend configuration - local filesystem on PVC
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      # Tempo's internal block format
      block:
        version: vParquet4  # Tempo's columnar storage format
      # Write-Ahead Log for ingestion buffering
      wal:
        path: /var/tempo/wal
  
  # Trace lifecycle management
  ingester:
    trace_idle_period: 10s
    max_block_duration: 2m  # Reduced from 30m for faster search availability
  
  # Compaction and retention (managed by Tempo)
  compactor:
    compaction:
      block_retention: 2h  # 2 hours retention to keep local PVC usage bounded

# Local PVC persistence for WAL + trace blocks
persistence:
  enabled: true
  size: 20Gi
  storageClassName: "ebs-sc"  # Use EBS CSI StorageClass

# Service configuration
# Tempo has no UI — only accessed internally by Grafana & AI Model
# Use 'kubectl port-forward -n tempo svc/tempo 3100:3100' for local debugging
service:
  type: ClusterIP
